# ============================================================================
# GameCI Unity Bridge — EpochWar
# ----------------------------------------------------------------------------
# WHAT THIS IS
#   A "bridge" that lets a REAL headless Unity Editor compile the EpochWar
#   project and run its EditMode tests in GitHub Actions on every push. The
#   Unity project root is the REPOSITORY ROOT (because `Assets/` lives at the
#   repo root), so GameCI operates on the repo directly.
#
# SINGLE SOURCE OF TRUTH FOR THE UNITY VERSION
#   The editor version is pinned in TWO places that MUST stay in sync and MUST
#   equal the Unity Editor installed on the developer's machine:
#     1. ProjectSettings/ProjectVersion.txt  (m_EditorVersion)
#     2. `unityVersion:` in the unity-test-runner step below
#
# REQUIRED GITHUB SECRETS (Settings > Secrets and variables > Actions)
#   Personal / free license:
#     UNITY_EMAIL    - Unity account email
#     UNITY_PASSWORD - Unity account password
#     UNITY_LICENSE  - contents of the .ulf activation file (see BRIDGE_SETUP.md)
#   Plus / Pro license (instead of UNITY_LICENSE):
#     UNITY_SERIAL   - Unity Plus/Pro serial   (+ UNITY_EMAIL + UNITY_PASSWORD)
#
# NOTE ON TEST DEPENDENCIES (NOT COMMITTED)
#   The EditMode test asmdef precompiled-references FsCheck.dll and
#   FSharp.Core.dll. These are NuGet DLLs (NOT Unity packages), so this
#   workflow FETCHES them at CI time into Assets/EpochWar/Tests/Plugins/.
#   That folder is git-ignored and must never be committed. nunit.framework.dll
#   is supplied by com.unity.test-framework, so it is NOT fetched here.
# ============================================================================

name: Unity CI (EpochWar)

on:
  push:
    branches: [epoch-war-combat-visuals-expansion]
    paths:
      - "Assets/EpochWar/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - ".github/workflows/unity-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "Assets/EpochWar/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - ".github/workflows/unity-ci.yml"
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: unity-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  editmode-tests:
    name: EditMode tests (headless Unity compile)
    runs-on: ubuntu-latest
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # Cache the Unity Library/ folder to speed up import on subsequent runs.
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-EpochWar-6000.5.2f1-${{ hashFiles('Packages/manifest.json') }}
          restore-keys: |
            Library-EpochWar-6000.5.2f1-
            Library-EpochWar-

      # Fetch FsCheck + FSharp.Core (NuGet) into the test Plugins folder so the
      # EditMode test assembly's precompiled references resolve. Robust: fails
      # the job with a clear message if any DLL cannot be located.
      - name: Fetch test DLLs (FsCheck + FSharp.Core)
        shell: bash
        run: |
          set -euo pipefail

          FSCHECK_VERSION="2.16.6"
          FSHARP_CORE_VERSION="8.0.401"
          PLUGINS_DIR="Assets/EpochWar/Tests/Plugins"
          WORK="$(mktemp -d)"

          mkdir -p "$PLUGINS_DIR"

          # Download a .nupkg (a zip) from nuget.org flat-container API.
          download_nupkg() {
            local id_lower="$1" version="$2" out="$3"
            local url="https://api.nuget.org/v3-flatcontainer/${id_lower}/${version}/${id_lower}.${version}.nupkg"
            echo "Downloading ${id_lower} ${version} from ${url}"
            curl -fSL --retry 3 --retry-delay 2 -o "$out" "$url"
          }

          # Extract a specific DLL, preferring netstandard2.0, then netstandard2.1,
          # then any lib/**/<dll>. Copies the first match into PLUGINS_DIR.
          extract_dll() {
            local nupkg="$1" dll="$2" extract_dir="$3"
            rm -rf "$extract_dir" && mkdir -p "$extract_dir"
            unzip -q "$nupkg" -d "$extract_dir"

            local candidates=(
              "$extract_dir/lib/netstandard2.0/$dll"
              "$extract_dir/lib/netstandard2.1/$dll"
            )
            for c in "${candidates[@]}"; do
              if [ -f "$c" ]; then
                cp "$c" "$PLUGINS_DIR/$dll"
                echo "Copied $dll from ${c#$extract_dir/}"
                return 0
              fi
            done

            # Fallback: first match anywhere under lib/
            local found
            found="$(find "$extract_dir/lib" -name "$dll" -type f 2>/dev/null | sort | head -n1 || true)"
            if [ -n "$found" ]; then
              cp "$found" "$PLUGINS_DIR/$dll"
              echo "Copied $dll from fallback ${found#$extract_dir/}"
              return 0
            fi

            echo "::error::Could not locate $dll inside $(basename "$nupkg"). Aborting."
            return 1
          }

          download_nupkg "fscheck" "$FSCHECK_VERSION" "$WORK/fscheck.nupkg"
          download_nupkg "fsharp.core" "$FSHARP_CORE_VERSION" "$WORK/fsharp.core.nupkg"

          extract_dll "$WORK/fscheck.nupkg" "FsCheck.dll" "$WORK/fscheck"
          extract_dll "$WORK/fsharp.core.nupkg" "FSharp.Core.dll" "$WORK/fsharpcore"

          echo "Contents of $PLUGINS_DIR:"
          ls -l "$PLUGINS_DIR"

          for required in "FsCheck.dll" "FSharp.Core.dll"; do
            if [ ! -f "$PLUGINS_DIR/$required" ]; then
              echo "::error::$required missing from $PLUGINS_DIR after fetch."
              exit 1
            fi
          done

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        with:
          testMode: editmode
          unityVersion: 6000.5.2f1
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifactsPath: artifacts

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: editmode-test-results
          path: artifacts
          if-no-files-found: warn
